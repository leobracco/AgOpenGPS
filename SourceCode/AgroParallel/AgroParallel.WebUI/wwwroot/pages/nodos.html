<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>Nodos · Agro Parallel</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="../layout.css" />
  <link rel="stylesheet" href="../keyboard.css" />
  <style>
    .filter-bar { display:flex; gap: var(--agp-sp-3); margin-bottom: var(--agp-sp-4); flex-wrap:wrap; }
    .filter-bar .btn.active { background: var(--agp-accent-soft); border-color: var(--agp-accent); color: var(--agp-text); font-weight: var(--agp-fw-medium); }
  </style>
</head>
<body>
  <aside class="sidebar" data-active="nodos"></aside>
  <main class="page">
    <div class="page-head">
      <div><h1>Nodos</h1><div class="subtitle">Dispositivos AgroParallel descubiertos en la LAN</div></div>
      <div id="headerStats" style="display:flex; gap:var(--agp-sp-2)"></div>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="btn compact active" data-filter="all"    data-label="Todos">Todos</button>
      <button class="btn compact"        data-filter="quantix" data-label="QuantiX">QuantiX</button>
      <button class="btn compact"        data-filter="vistax"  data-label="VistaX">VistaX</button>
      <button class="btn compact"        data-filter="section" data-label="SectionX">SectionX</button>
      <button class="btn compact"        data-filter="storm"   data-label="StormX">StormX</button>
      <button class="btn compact"        data-filter="flow"    data-label="FlowX">FlowX</button>
    </div>

    <div class="node-list" id="nodeList"></div>

    <h2>Auto-descubrimiento</h2>
    <div class="card" style="max-width:720px">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--agp-sp-3)">
        <div>
          <div style="font-weight:var(--agp-fw-semi)">Suscrito a</div>
          <div style="color:var(--agp-text-muted); font-family:var(--agp-font-mono); font-size:var(--agp-fs-sm)">agp/+/+/announcement (retained)</div>
          <div style="color:var(--agp-text-muted); font-family:var(--agp-font-mono); font-size:var(--agp-fs-sm)">agp/+/+/status_live (safety net)</div>
        </div>
        <span class="pill ok"><span class="dot"></span> activo</span>
      </div>
      <button class="btn" id="rescanBtn">Re-escanear ahora</button>
    </div>
  </main>
  <script src="../js/keyboard.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/nodos.js"></script>
</body>
</html>
