<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>Piloto · Agro Parallel</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="../layout.css" />
  <style>
    .pilot-hero {
      display:grid; grid-template-columns: 1fr 1fr; gap: var(--agp-sp-5);
    }
    .pilot-main {
      background: var(--agp-surface); border-radius: var(--agp-radius-lg);
      border: var(--agp-border-w) solid var(--agp-border);
      padding: var(--agp-sp-6); text-align:center;
    }
    .pilot-main .big {
      font-family: var(--agp-font-mono); font-size: 96px; font-weight: var(--agp-fw-bold);
      color: var(--agp-accent); line-height: 1;
    }
    .pilot-main .label { color: var(--agp-text-muted); text-transform: uppercase; letter-spacing: 1px; font-size: var(--agp-fs-sm); margin-top: var(--agp-sp-3); }
    .compass {
      width: 180px; height: 180px; margin: 0 auto;
      border-radius: 50%; border: 4px solid var(--agp-border);
      position: relative; background: var(--agp-bg);
    }
    .compass .needle {
      position: absolute; left: 50%; top: 8px; width: 4px; height: 80px;
      background: var(--agp-accent); transform-origin: bottom center;
      transform: translateX(-50%) rotate(15deg);
    }
    .compass .n { position: absolute; left: 50%; top: -22px; transform: translateX(-50%); font-weight: var(--agp-fw-bold); }
    .toggles { display:flex; flex-wrap:wrap; gap: var(--agp-sp-3); }
  </style>
</head>
<body>
  <aside class="sidebar" data-active="piloto"></aside>
  <main class="page">
    <div class="page-head">
      <div><h1>Piloto</h1><div class="subtitle">Autoguiado · seguimiento de línea AB</div></div>
      <span class="pill ok"><span class="dot"></span> AUTO ON</span>
    </div>

    <div class="pilot-hero">
      <div class="pilot-main">
        <div class="big">0.8</div>
        <div class="label">Error lateral · cm</div>
        <div style="margin-top:var(--agp-sp-5)">
          <button class="btn primary" style="min-width:200px">⏸  Desactivar Auto</button>
        </div>
      </div>
      <div class="pilot-main">
        <div class="compass">
          <div class="n">N</div>
          <div class="needle"></div>
        </div>
        <div class="big" style="font-size:48px; margin-top:var(--agp-sp-4)">87°</div>
        <div class="label">Rumbo</div>
      </div>
    </div>

    <h2>Asistencias</h2>
    <div class="toggles">
      <label class="switch"><input type="checkbox" checked><span class="track"></span> Auto-secciones</label>
      <label class="switch"><input type="checkbox" checked><span class="track"></span> Tasa variable</label>
      <label class="switch"><input type="checkbox"><span class="track"></span> Recordatorio fin línea</label>
      <label class="switch"><input type="checkbox" checked><span class="track"></span> Cámaras visibles</label>
    </div>

    <h2>Trabajo en curso</h2>
    <div class="grid">
      <div class="card"><h3>Hectáreas</h3><div class="metric">12.4<span class="unit">ha</span></div><div class="row"><span>De 32.0 totales</span><strong style="color:var(--agp-text)">38%</strong></div></div>
      <div class="card"><h3>Pasada</h3><div class="metric">7<span class="unit">de 18</span></div><div class="row"><span>Línea AB · Norte</span><span class="pill ok"><span class="dot"></span> centrada</span></div></div>
      <div class="card"><h3>Solapamiento</h3><div class="metric" style="font-size:var(--agp-fs-2xl)">2.1<span class="unit">%</span></div><div class="row"><span>Dentro del óptimo</span><span class="pill ok"><span class="dot"></span> OK</span></div></div>
    </div>
  </main>
  <script src="../js/sidebar.js"></script>
</body>
</html>
