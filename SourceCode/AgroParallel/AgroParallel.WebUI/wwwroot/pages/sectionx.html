<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>SectionX · Agro Parallel</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="../layout.css" />
  <link rel="stylesheet" href="../keyboard.css" />
  <style>
    .seg-row { display:grid; grid-template-columns: 80px 1fr; gap: var(--agp-sp-3); align-items:center; margin-bottom: var(--agp-sp-2); }
    .seg-row .name { font-weight: var(--agp-fw-medium); }
    .seg-row .state {
      height: 36px; border-radius: var(--agp-radius-md);
      background: var(--agp-bg-soft); display:flex; align-items:center; justify-content:center;
      font-weight: var(--agp-fw-bold); color: var(--agp-text-muted);
    }
    .seg-row.on .state { background: var(--agp-accent); color: white; }

    .cable-grid {
      display:grid; grid-template-columns: repeat(8, 1fr); gap: var(--agp-sp-2); margin-bottom: var(--agp-sp-2);
    }
    .cable-cell {
      background: var(--agp-bg-soft); border: var(--agp-border-w) solid var(--agp-border);
      border-radius: var(--agp-radius-md); padding: var(--agp-sp-2);
      display:flex; flex-direction:column; align-items:center; gap:4px;
    }
    .cable-cell.on { border-color: var(--agp-accent); background: rgba(74,186,62,0.08); }
    .cable-cell .cable-num {
      font-family: var(--agp-font-mono); font-weight: var(--agp-fw-bold);
      color: var(--agp-text-muted); font-size: var(--agp-fs-sm);
    }
    .cable-cell.on .cable-num { color: var(--agp-accent); }
    .cable-cell input[type=number] {
      width: 100%; text-align:center; padding: 4px;
      font-family: var(--agp-font-mono); font-size: var(--agp-fs-md); font-weight: var(--agp-fw-bold);
    }
    .cable-cell select { width:100%; font-size: var(--agp-fs-xs); padding: 2px; }
  </style>
</head>
<body>
  <aside class="sidebar" data-active="sectionx"></aside>
  <main class="page">
    <div class="page-head">
      <div><h1>SectionX</h1><div class="subtitle">Control automático de secciones</div></div>
      <div style="display:flex; gap:var(--agp-sp-3); align-items:center">
        <label class="switch"><input type="checkbox" id="enabledChk"><span class="track"></span> Habilitado</label>
        <select id="nodoSel" style="min-width:240px"></select>
      </div>
    </div>

    <h2 style="margin-top:0">Estado en vivo (vista AOG)</h2>
    <div class="card" id="liveSections">
      <div class="subtitle">Cargando…</div>
    </div>

    <h2>Mapeo cables → secciones AOG</h2>
    <div class="card">
      <div id="nodoForm"></div>
      <div id="cablesGrid" style="margin-top: var(--agp-sp-3)"></div>
      <div class="subtitle" style="margin-top:var(--agp-sp-2)">Cada celda = un cable del SectionX controller. Ingresá el nº de sección AOG (1..16). 0 = no asignado. Tren = cuál línea de siembra está conectada.</div>
    </div>

    <h2>JSON (debug)</h2>
    <div class="card">
      <textarea id="jsonOut" readonly style="min-height:160px; font-family:var(--agp-font-mono); font-size:var(--agp-fs-sm)"></textarea>
      <div style="display:flex; gap:var(--agp-sp-3); margin-top: var(--agp-sp-3); align-items:center">
        <button class="btn primary" id="btnSave">Guardar mapeo</button>
        <button class="btn" id="btnTest">Probar 1s todos</button>
        <span id="hint" style="color: var(--agp-text-muted); font-size: var(--agp-fs-sm)"></span>
      </div>
    </div>
  </main>
  <script src="../js/keyboard.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/sectionx.js"></script>
</body>
</html>
