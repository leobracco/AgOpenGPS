<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>Cámaras · Agro Parallel</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="../layout.css" />
  <style>
    .cam-grid {
      display:grid; grid-template-columns: repeat(2, 1fr); gap: var(--agp-sp-4);
    }
    .cam-tile {
      background: #0e1612; border-radius: var(--agp-radius-lg);
      border: var(--agp-border-w) solid var(--agp-border);
      aspect-ratio: 16/9; position: relative; overflow: hidden;
      display:grid; place-items:center;
      color: rgba(255,255,255,0.4); font-family: var(--agp-font-mono);
    }
    .cam-tile .label {
      position:absolute; top: var(--agp-sp-3); left: var(--agp-sp-3);
      padding: 2px 8px; background: rgba(0,0,0,0.55); color:white;
      font-size: var(--agp-fs-sm); border-radius: var(--agp-radius-sm);
    }
    .cam-tile .rec {
      position:absolute; top: var(--agp-sp-3); right: var(--agp-sp-3);
      display:flex; align-items:center; gap:6px; color: #ff5555;
      font-size: var(--agp-fs-xs); font-weight: var(--agp-fw-bold);
    }
    .cam-tile .rec::before { content:''; width:8px; height:8px; border-radius:50%; background:#ff5555; }
    .cam-tile.off { color: rgba(255,255,255,0.2); }
    .cam-tile.off::after { content: 'SIN SEÑAL'; font-size: 18px; letter-spacing: 4px; }
  </style>
</head>
<body>
  <aside class="sidebar" data-active="camaras"></aside>
  <main class="page">
    <div class="page-head">
      <div><h1>Cámaras</h1><div class="subtitle">4 cámaras configuradas</div></div>
      <div style="display:flex; gap:var(--agp-sp-2)">
        <button class="btn">Ventana flotante</button>
        <button class="btn primary">Pantalla completa</button>
      </div>
    </div>

    <div class="cam-grid">
      <div class="cam-tile">
        <span class="label">CAM 1 · Frente</span>
        <span class="rec">REC</span>
        ▶ stream MJPEG
      </div>
      <div class="cam-tile">
        <span class="label">CAM 2 · Tolva</span>
        ▶ stream MJPEG
      </div>
      <div class="cam-tile">
        <span class="label">CAM 3 · Tren trasero</span>
        ▶ stream MJPEG
      </div>
      <div class="cam-tile off">
        <span class="label">CAM 4 · Reversa</span>
      </div>
    </div>

    <h2>Configuración</h2>
    <div class="card" style="max-width:820px">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: var(--agp-sp-4)">
        <div class="field"><label>Cam 1 · URL</label><input type="text" value="http://192.168.5.51/stream"></div>
        <div class="field"><label>Cam 2 · URL</label><input type="text" value="http://192.168.5.52/stream"></div>
        <div class="field"><label>Cam 3 · URL</label><input type="text" value="http://192.168.5.53/stream"></div>
        <div class="field"><label>Cam 4 · URL</label><input type="text" value="rtsp://192.168.5.54/h264"></div>
      </div>
      <div style="display:flex; gap:var(--agp-sp-3); margin-top: var(--agp-sp-3)">
        <button class="btn primary">Guardar</button>
        <button class="btn">Probar URLs</button>
      </div>
    </div>
  </main>
  <script src="../js/sidebar.js"></script>
</body>
</html>
