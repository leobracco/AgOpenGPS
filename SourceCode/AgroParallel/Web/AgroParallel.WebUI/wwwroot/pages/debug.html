<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debug · Agro Parallel</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="../layout.css" />
  <link rel="stylesheet" href="../keyboard.css" />
  <style>
    .dbg-toolbar {
      display:flex; align-items:center; flex-wrap:wrap; gap:var(--agp-sp-3);
      background: var(--agp-surface); border: var(--agp-border-w) solid var(--agp-border);
      border-radius: var(--agp-radius-md); padding: var(--agp-sp-3); margin-bottom: var(--agp-sp-3);
    }
    .dbg-modules { display:flex; flex-wrap:wrap; gap:var(--agp-sp-2); }
    .chip {
      padding: 6px 12px; border-radius: 999px; cursor: pointer;
      background: var(--agp-bg-soft); color: var(--agp-text-muted);
      border: 1px solid var(--agp-border); font-size: var(--agp-fs-sm);
      user-select: none;
    }
    .chip.on {
      background: var(--agp-accent-soft); color: var(--agp-accent);
      border-color: var(--agp-accent);
    }
    .dbg-controls { display:flex; gap:var(--agp-sp-2); align-items:center; margin-left:auto; flex-wrap:wrap; }
    .dbg-level { display:flex; gap:0; border:1px solid var(--agp-border); border-radius: var(--agp-radius-sm); overflow:hidden; }
    .dbg-level button {
      padding:6px 10px; border:0; background: var(--agp-surface); cursor:pointer;
      color: var(--agp-text-muted); font-size: var(--agp-fs-sm); border-right:1px solid var(--agp-border);
    }
    .dbg-level button:last-child { border-right:0; }
    .dbg-level button.on { background: var(--agp-accent); color:#fff; }
    .dbg-search { padding:6px 10px; border:1px solid var(--agp-border); border-radius: var(--agp-radius-sm); min-width:200px; }
    .dbg-rec-on { color:#C92D2D; font-weight: var(--agp-fw-bold); }
    .dbg-rec-on::before { content:'●  '; }

    .dbg-buffer {
      background: #0E1311; color:#D4E4DC;
      font-family: var(--agp-font-mono); font-size: 12.5px; line-height: 1.4;
      border-radius: var(--agp-radius-md); padding: 10px 12px;
      height: calc(100vh - 240px); overflow:auto;
      box-shadow: inset 0 0 0 1px var(--agp-border);
    }
    .dbg-line { display:flex; gap:10px; padding: 1px 0; white-space: pre-wrap; word-break: break-word; }
    .dbg-line .ts { color:#6E847A; flex: 0 0 92px; }
    .dbg-line .mod { color:#88C26C; flex: 0 0 88px; }
    .dbg-line.l-warn .mod { color:#E2B23E; }
    .dbg-line.l-error .mod { color:#FF6B6B; }
    .dbg-line.l-debug .mod { color:#7DA2C9; }
    .dbg-line .msg { flex: 1; }
    .dbg-line.l-error .msg { color:#FFB6B6; }
    .dbg-line.l-warn .msg  { color:#F0D89A; }
    .dbg-line.hide { display:none; }

    .dbg-empty { color:#6E847A; text-align:center; padding: 40px 0; }
    .pill.live { background: var(--agp-state-ok); color:#fff; }
    .pill.paused { background: #888; color:#fff; }
  </style>
</head>
<body>
  <aside class="sidebar" data-active="debug"></aside>
  <main class="page">
    <div class="page-head">
      <div>
        <h1>Debug</h1>
        <div class="subtitle">Log unificado de todos los módulos del sistema</div>
      </div>
      <span class="pill live" id="dbgStatus"><span class="dot"></span> En vivo</span>
    </div>

    <div class="dbg-toolbar">
      <div class="dbg-modules" id="dbgModules"></div>
      <div class="dbg-controls">
        <input type="search" class="dbg-search" id="dbgSearch" placeholder="Filtrar..." data-no-keyboard />
        <div class="dbg-level" id="dbgLevel">
          <button data-lvl="debug">Debug</button>
          <button data-lvl="info" class="on">Info</button>
          <button data-lvl="warn">Warn</button>
          <button data-lvl="error">Error</button>
        </div>
        <button class="btn" id="btnPause">Pausar</button>
        <button class="btn" id="btnClear">Limpiar</button>
        <button class="btn" id="btnRecord">Grabar</button>
        <button class="btn" id="btnExport">Exportar</button>
      </div>
    </div>

    <div class="dbg-buffer" id="dbgBuffer">
      <div class="dbg-empty">Cargando…</div>
    </div>
  </main>

  <script src="../js/keyboard.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/debug.js"></script>
</body>
</html>
